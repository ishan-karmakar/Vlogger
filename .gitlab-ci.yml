# Official language image. Look for the different tagged releases at:
# https://hub.docker.com/r/library/python/tags/
image: python:latest

# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  # https://pip.pypa.io/en/stable/topics/caching/
  cache:
    paths:
      - .cache/pip

  before_script:
    - pip install poetry
    - python -m poetry build

test-pypi:
  stage: deploy
  rules:
  - if: $CI_MERGE_REQUEST_ID
  script:
  - python -m poetry config repositories.test-pypi https://test.pypi.org/legacy/
  - python -m poetry config pypi-token.test-pypi $TEST_PYPI_TOKEN
  - |
    python -m poetry publish -r test-pypi 2>&1 | tee publish.log || EXIT_CODE=$?
    if [ $EXIT_CODE -ne 0 ]; then
      if ! grep -q 'File already exists' publish.log; then
        echo File already exists
      fi
    fi

pypi:
  stage: deploy
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
  - python -m poetry config pypi-token.pypi $PYPI_TOKEN
  - python -m poetry publish